<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Stats &amp; Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Sora:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════
   RESET & CSS CUSTOM PROPERTIES
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:       #050b12;
  --bg-card:       #0c1722;
  --bg-card-hover: #111f2e;
  --bg-glass:      rgba(12, 23, 34, 0.72);
  --border:        rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.14);

  --green:    #00e676;
  --green-dim: #00c95f;
  --gold:     #ffc107;
  --gold-dim: #e6ac00;
  --electric: #00b4ff;
  --electric-dim: #0090cc;
  --red:      #ff4757;

  --text-primary:   #f0f4f8;
  --text-secondary: #8a9ab0;
  --text-muted:     #4a5a6a;

  --font-display: 'Anton', sans-serif;
  --font-heading: 'Archivo Black', sans-serif;
  --font-body:    'Sora', sans-serif;

  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow-green:   0 0 24px rgba(0,230,118,0.25);
  --shadow-glow-gold:    0 0 24px rgba(255,193,7,0.25);
  --shadow-glow-electric:0 0 24px rgba(0,180,255,0.25);

  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 3px; }

/* ═══════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════ */
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
.section { padding: 72px 0; }
.section-sm { padding: 48px 0; }

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--electric);
  margin-bottom: 10px;
}
.section-label::before {
  content: '';
  display: block;
  width: 18px; height: 2px;
  background: var(--electric);
  border-radius: 1px;
}

.section-title {
  font-family: var(--font-heading);
  font-size: clamp(28px, 5vw, 44px);
  line-height: 1.1;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.section-sub {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 40px;
  max-width: 560px;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.badge-live  { background: rgba(255,71,87,0.18); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
.badge-win   { background: rgba(0,230,118,0.15); color: var(--green); }
.badge-draw  { background: rgba(255,193,7,0.15); color: var(--gold); }
.badge-loss  { background: rgba(255,71,87,0.15); color: var(--red); }
.badge-soon  { background: rgba(0,180,255,0.15); color: var(--electric); }

.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.fade-in { animation: fadeIn 0.6s ease both; }
.slide-up { animation: slideUp 0.5s ease both; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

/* ═══════════════════════════════════════════════════
   HEADER / NAV
═══════════════════════════════════════════════════ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  background: rgba(5,11,18,0.85);
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}
#header.scrolled { box-shadow: 0 4px 32px rgba(0,0,0,0.5); }

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 24px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.nav-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--green), var(--electric));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.nav-logo-text {
  font-family: var(--font-heading);
  font-size: 17px;
  color: var(--text-primary);
  line-height: 1.1;
}
.nav-logo-text span { color: var(--green); }
.nav-logo-year {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  list-style: none;
}
.nav-links a {
  display: block;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  transition: var(--transition);
}
.nav-links a:hover { color: var(--text-primary); background: var(--border); }

.nav-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Language Toggle */
.lang-toggle {
  display: flex;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px;
  cursor: pointer;
  gap: 2px;
}
.lang-btn {
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  border: none;
  background: transparent;
  cursor: pointer;
  transition: var(--transition);
}
.lang-btn.active {
  background: linear-gradient(135deg, var(--green), var(--electric));
  color: #000;
}

/* Hamburger */
.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
}
.nav-hamburger span {
  display: block;
  width: 22px; height: 2px;
  background: var(--text-primary);
  border-radius: 1px;
  transition: var(--transition);
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-hamburger { display: flex; }
}

/* ═══════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding-top: 64px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 60% 40%, rgba(0,180,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 30% 70%, rgba(0,230,118,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(255,193,7,0.05) 0%, transparent 50%);
}

.hero-grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 760px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,230,118,0.1);
  border: 1px solid rgba(0,230,118,0.2);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 22px;
  animation: slideUp 0.5s 0.1s ease both;
}
.hero-eyebrow-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(56px, 10vw, 110px);
  line-height: 0.92;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  margin-bottom: 18px;
  animation: slideUp 0.5s 0.2s ease both;
}
.hero-title .line1 { color: var(--text-primary); }
.hero-title .line2 {
  background: linear-gradient(90deg, var(--green) 0%, var(--electric) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-title .line3 { color: var(--text-primary); }

.hero-desc {
  font-size: 17px;
  color: var(--text-secondary);
  max-width: 480px;
  margin-bottom: 36px;
  animation: slideUp 0.5s 0.3s ease both;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  animation: slideUp 0.5s 0.4s ease both;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: linear-gradient(135deg, var(--green), var(--electric));
  border-radius: var(--radius-md);
  font-weight: 700;
  font-size: 14px;
  color: #000;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 20px rgba(0,230,118,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,230,118,0.4); }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: transparent;
  border-radius: var(--radius-md);
  font-weight: 600;
  font-size: 14px;
  color: var(--text-primary);
  text-decoration: none;
  border: 1px solid var(--border-bright);
  cursor: pointer;
  transition: var(--transition);
}
.btn-secondary:hover { background: var(--border); border-color: var(--border-bright); }

/* Countdown */
.hero-countdown {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 16px;
  animation: fadeIn 0.8s 0.5s ease both;
}

@media (max-width: 1024px) {
  .hero-countdown { display: none; }
}

.countdown-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.countdown-units {
  display: flex;
  gap: 8px;
}
.countdown-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  min-width: 72px;
}
.countdown-num {
  font-family: var(--font-display);
  font-size: 36px;
  line-height: 1;
  background: linear-gradient(135deg, var(--text-primary), var(--electric));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.countdown-unit-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Host cities strip */
.hero-hosts {
  position: absolute;
  bottom: 40px;
  left: 0; right: 0;
  overflow: hidden;
  animation: fadeIn 1s 0.8s ease both;
}
.hero-hosts-inner {
  display: flex;
  gap: 24px;
  animation: marquee 28s linear infinite;
  width: max-content;
}
.hero-hosts-inner:hover { animation-play-state: paused; }
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

.host-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}
.host-chip .flag { font-size: 14px; }
.host-chip .dot  { width:3px;height:3px;background:var(--text-muted);border-radius:50%; }

/* ═══════════════════════════════════════════════════
   TOURNAMENT STATS
═══════════════════════════════════════════════════ */
#tournament-stats {
  background: linear-gradient(180deg, var(--bg-base) 0%, var(--bg-card) 100%);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 2px;
  background: var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
}

.stat-card {
  background: var(--bg-card);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  transition: var(--transition);
  cursor: default;
}
.stat-card:hover { background: var(--bg-card-hover); }

.stat-icon {
  font-size: 22px;
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 42px;
  line-height: 1;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--electric) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-card:nth-child(2n) .stat-value {
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--green) 100%);
  -webkit-background-clip: text;
  background-clip: text;
}
.stat-card:nth-child(3n) .stat-value {
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  background-clip: text;
}
.stat-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ═══════════════════════════════════════════════════
   GROUPS & STANDINGS
═══════════════════════════════════════════════════ */
#groups { background: var(--bg-base); }

.group-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 28px;
}
.group-tab {
  padding: 7px 18px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}
.group-tab.active, .group-tab:hover {
  background: var(--green);
  border-color: var(--green);
  color: #000;
}

.groups-display {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.group-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition);
}
.group-card:hover { border-color: var(--border-bright); box-shadow: var(--shadow-card); }

.group-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(0,230,118,0.05) 0%, transparent 100%);
}
.group-name {
  font-family: var(--font-heading);
  font-size: 16px;
  color: var(--green);
}
.group-status {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.standings-table { width: 100%; border-collapse: collapse; }
.standings-table th {
  padding: 8px 20px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: right;
  background: rgba(255,255,255,0.02);
}
.standings-table th:first-child { text-align: left; padding-left: 20px; }
.standings-table td {
  padding: 12px 20px;
  font-size: 13px;
  color: var(--text-secondary);
  text-align: right;
  border-top: 1px solid var(--border);
}
.standings-table td:first-child { text-align: left; }

.standings-table tr.qualify td { background: rgba(0,230,118,0.04); }
.standings-table tr.qualify-play td { background: rgba(255,193,7,0.04); }

.team-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}
.team-flag {
  font-size: 22px;
  line-height: 1;
  flex-shrink: 0;
}
.team-name-cell {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 13px;
}
.team-form {
  display: flex;
  gap: 3px;
}
.form-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.form-W { background: var(--green); }
.form-D { background: var(--gold); }
.form-L { background: var(--red); }

.pts-cell {
  font-family: var(--font-heading);
  font-size: 16px;
  color: var(--text-primary) !important;
}

.qual-indicator {
  width: 3px;
  height: 32px;
  position: absolute;
  left: 0;
  border-radius: 0 2px 2px 0;
}

/* ═══════════════════════════════════════════════════
   TOP SCORERS
═══════════════════════════════════════════════════ */
#scorers { background: var(--bg-card); }

.scorers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 768px) { .scorers-grid { grid-template-columns: 1fr; } }

.scorers-panel {
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.scorers-panel-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.scorers-panel-icon { font-size: 20px; }
.scorers-panel-title {
  font-family: var(--font-heading);
  font-size: 15px;
  color: var(--text-primary);
}
.scorers-panel-sub { font-size: 12px; color: var(--text-muted); margin-left: auto; }

.scorer-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}
.scorer-row:last-child { border-bottom: none; }
.scorer-row:hover { background: rgba(255,255,255,0.02); }

.scorer-rank {
  font-family: var(--font-heading);
  font-size: 18px;
  color: var(--text-muted);
  width: 28px;
  flex-shrink: 0;
  text-align: center;
}
.scorer-rank.gold-rank { color: var(--gold); }
.scorer-rank.silver-rank { color: #c0c0c0; }
.scorer-rank.bronze-rank { color: #cd7f32; }

.scorer-flag { font-size: 22px; flex-shrink: 0; }

.scorer-info { flex: 1; min-width: 0; }
.scorer-name { font-weight: 600; color: var(--text-primary); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scorer-team { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.scorer-bar-wrap { flex: 1; min-width: 60px; }
.scorer-bar-bg { height: 5px; background: var(--bg-card); border-radius: 3px; overflow: hidden; }
.scorer-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.scorer-bar-fill.gold   { background: linear-gradient(90deg, var(--gold), #ff9800); }
.scorer-bar-fill.green  { background: linear-gradient(90deg, var(--green), var(--electric)); }

.scorer-stat {
  font-family: var(--font-heading);
  font-size: 22px;
  color: var(--text-primary);
  flex-shrink: 0;
  width: 36px;
  text-align: right;
}
.scorer-stat.gold-text { color: var(--gold); }

/* ═══════════════════════════════════════════════════
   MATCHES / CALENDAR
═══════════════════════════════════════════════════ */
#matches { background: var(--bg-base); }

.match-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}
.match-filter {
  padding: 7px 18px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}
.match-filter.active { background: var(--electric); border-color: var(--electric); color: #000; }
.match-filter:hover:not(.active) { border-color: var(--border-bright); color: var(--text-primary); }

.matches-list { display: flex; flex-direction: column; gap: 10px; }

.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 24px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
  transition: var(--transition);
  cursor: default;
}
.match-card:hover { border-color: var(--border-bright); background: var(--bg-card-hover); }
.match-card.live { border-color: rgba(255,71,87,0.3); box-shadow: 0 0 20px rgba(255,71,87,0.08); }

.match-team {
  display: flex;
  align-items: center;
  gap: 12px;
}
.match-team.away { flex-direction: row-reverse; text-align: right; }

.match-team-flag { font-size: 28px; }
.match-team-name { font-weight: 700; font-size: 15px; color: var(--text-primary); }
.match-team-rank { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.match-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.match-score {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--text-primary);
  letter-spacing: 0.05em;
}
.match-score.tbd {
  font-size: 20px;
  color: var(--text-muted);
}

.match-meta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.match-group-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.match-time { font-size: 12px; color: var(--text-secondary); }
.match-venue { font-size: 11px; color: var(--text-muted); }

/* ═══════════════════════════════════════════════════
   NEWS FEED
═══════════════════════════════════════════════════ */
#news { background: var(--bg-card); border-top: 1px solid var(--border); }

.news-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 20px;
}
@media (max-width: 1024px) { .news-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 640px)  { .news-grid { grid-template-columns: 1fr; } }

.news-card {
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: var(--transition);
  text-decoration: none;
  color: inherit;
}
.news-card:hover { border-color: var(--border-bright); transform: translateY(-3px); box-shadow: var(--shadow-card); }

.news-card.featured {
  grid-row: 1 / 3;
}
@media (max-width: 1024px) { .news-card.featured { grid-row: auto; } }

.news-img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: var(--bg-card);
  overflow: hidden;
  position: relative;
}
.news-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}
.news-card.featured .news-img { aspect-ratio: 4/3; }

.news-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

.news-source {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--electric);
}
.news-source-dot { width: 4px;height:4px;border-radius:50%;background:var(--border-bright); }
.news-date { color: var(--text-muted); font-weight: 400; text-transform: none; letter-spacing: 0; }

.news-title {
  font-family: var(--font-heading);
  font-size: 16px;
  line-height: 1.25;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.news-card.featured .news-title { font-size: 22px; -webkit-line-clamp: 4; }

.news-excerpt {
  font-size: 13px;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.news-read-more {
  font-size: 12px;
  font-weight: 600;
  color: var(--electric);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 8px;
}

/* ═══════════════════════════════════════════════════
   FEATURED TEAMS
═══════════════════════════════════════════════════ */
#teams { background: var(--bg-base); }

.teams-scroll {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-card) transparent;
}

.team-card {
  flex-shrink: 0;
  width: 200px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: var(--transition);
  cursor: default;
}
.team-card:hover { border-color: var(--border-bright); transform: translateY(-4px); box-shadow: var(--shadow-card); }
.team-card.favorites { border-color: rgba(255,193,7,0.3); }
.team-card.favorites:hover { box-shadow: var(--shadow-glow-gold); }

.team-card-flag { font-size: 44px; }
.team-card-name { font-family: var(--font-heading); font-size: 14px; color: var(--text-primary); text-align: center; }
.team-card-rank-row { display: flex; align-items: center; gap: 6px; }
.team-card-rank {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 100px;
  background: rgba(0,180,255,0.1);
  color: var(--electric);
  border: 1px solid rgba(0,180,255,0.2);
}
.team-card-group { font-size: 12px; color: var(--text-muted); }

.team-card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  width: 100%;
  margin-top: 4px;
}
.team-stat-mini {
  background: var(--bg-base);
  padding: 8px 6px;
  text-align: center;
}
.team-stat-mini-val { font-family: var(--font-heading); font-size: 16px; color: var(--text-primary); }
.team-stat-mini-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 1px; }

.team-form-row { display: flex; gap: 4px; }

/* ═══════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════ */
footer {
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 40px 0 32px;
}
.footer-inner {
  display: flex;
  flex-direction: column;
  gap: 24px;
  align-items: center;
  text-align: center;
}
.footer-logo { font-family: var(--font-heading); font-size: 18px; }
.footer-logo span { color: var(--green); }
.footer-tagline { font-size: 13px; color: var(--text-muted); }
.footer-api-note {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 18px;
  max-width: 640px;
}
.footer-api-note strong { color: var(--gold); }
.footer-copy { font-size: 12px; color: var(--text-muted); }

/* ═══════════════════════════════════════════════════
   DATA SOURCE INDICATOR
═══════════════════════════════════════════════════ */
.data-mode-banner {
  background: linear-gradient(90deg, rgba(255,193,7,0.12), rgba(255,193,7,0.06));
  border-bottom: 1px solid rgba(255,193,7,0.2);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
}
.data-mode-banner .icon { font-size: 14px; }

/* ═══════════════════════════════════════════════════
   SCROLL ANIMATIONS
═══════════════════════════════════════════════════ */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.reveal.visible {
  opacity: 1;
  transform: none;
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ═══════════════════════════════════════════════════
   LOADING SPINNER
═══════════════════════════════════════════════════ */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--electric);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════
   RESPONSIVE TWEAKS
═══════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .section { padding: 48px 0; }
  .match-card { grid-template-columns: 1fr; gap: 12px; text-align: center; }
  .match-team.away { flex-direction: row; justify-content: flex-end; }
  .match-center { flex-direction: row; gap: 16px; }
  .hero-title { font-size: clamp(44px, 14vw, 80px); }
}

/* ═══════════════════════════════════════════════════
   QUALIFICATION LEGEND
═══════════════════════════════════════════════════ */
.qual-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 20px;
}
.qual-legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--text-muted);
}
.qual-dot { width: 10px; height: 10px; border-radius: 2px; }
.qual-dot.green { background: var(--green); }
.qual-dot.gold  { background: var(--gold); }

/* tabs for showing 1 or all groups */
.show-all-btn {
  padding: 9px 22px;
  background: transparent;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 24px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
.show-all-btn:hover { background: var(--border); color: var(--text-primary); }

/* ── Pre-tournament additions ── */
.stat-card.stat-accent { border-color: rgba(255,193,7,0.45); background: linear-gradient(160deg, rgba(255,193,7,0.10), rgba(255,255,255,0.02)); }
.stat-card.stat-accent .stat-value { color: var(--gold); }

.match-opener {
  font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
  color: var(--gold); background: rgba(255,193,7,0.12);
  border: 1px solid rgba(255,193,7,0.3); border-radius: 100px; padding: 2px 9px; margin-bottom: 4px;
}
.team-card-host {
  font-size: 11px; font-weight: 700; color: var(--field-light);
  background: rgba(0,200,120,0.12); border: 1px solid rgba(0,200,120,0.25);
  border-radius: 100px; padding: 2px 8px;
}

/* Golden Boot empty state */
.scorers-empty {
  grid-column: 1 / -1; text-align: center;
  padding: 48px 24px; border: 1px dashed var(--border-bright);
  border-radius: var(--radius-lg);
  background: radial-gradient(120% 120% at 50% 0%, rgba(255,193,7,0.06), transparent 60%);
}
.scorers-empty-emoji { font-size: 46px; margin-bottom: 12px; filter: drop-shadow(0 6px 16px rgba(255,193,7,0.25)); }
.scorers-empty-title { font-family: var(--font-display); font-size: clamp(20px,3vw,28px); color: var(--text-primary); margin-bottom: 8px; }
.scorers-empty-sub { color: var(--text-secondary); max-width: 540px; margin: 0 auto 26px; font-size: 14px; line-height: 1.6; }
.watch-label { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.watch-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.watch-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface-2); border: 1px solid var(--border-bright);
  border-radius: 100px; padding: 8px 14px; transition: var(--transition);
}
.watch-chip:hover { transform: translateY(-2px); border-color: var(--gold); }
.watch-flag { font-size: 18px; }
.watch-name { font-weight: 700; font-size: 13px; color: var(--text-primary); }
.watch-team { font-size: 12px; color: var(--text-muted); }

/* Live-data banner states */
.data-mode-banner.is-live { background: linear-gradient(90deg, rgba(0,200,120,0.14), rgba(0,200,120,0.05)); border-bottom-color: rgba(0,200,120,0.25); color: var(--field-light); }
.data-mode-banner.is-loading { background: linear-gradient(90deg, rgba(0,180,255,0.12), rgba(0,180,255,0.04)); border-bottom-color: rgba(0,180,255,0.2); color: var(--electric); }
.data-mode-banner .refresh-btn {
  margin-left: 10px; font: inherit; font-size: 11px; font-weight: 700; cursor: pointer;
  color: inherit; background: transparent; border: 1px solid currentColor; opacity: .8;
  border-radius: 100px; padding: 1px 10px; transition: var(--transition);
}
.data-mode-banner .refresh-btn:hover { opacity: 1; }

/* ── Match-browser round tabs ── */
.round-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.round-tab {
  font: inherit; font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 100px; cursor: pointer;
  background: var(--surface-2); border: 1px solid var(--border-bright); color: var(--text-secondary);
  transition: var(--transition); white-space: nowrap;
}
.round-tab:hover { color: var(--text-primary); border-color: var(--gold); }
.round-tab.active { background: var(--gold); color: #1a1205; border-color: var(--gold); }
.round-tab .rt-count { opacity: .6; font-size: 11px; margin-left: 4px; }

/* ── Stats leaders ── */
.stats-leaders { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; margin-top: 18px; }
.leader-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 15px 18px; display: flex; align-items: center; gap: 14px; transition: var(--transition);
}
.leader-card:hover { border-color: var(--border-bright); transform: translateY(-2px); }
.leader-card.wide { grid-column: 1 / -1; }
.leader-icon { font-size: 26px; line-height: 1; }
.leader-body { min-width: 0; flex: 1; }
.leader-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
.leader-main { font-size: 15px; font-weight: 800; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.leader-sub { font-size: 12px; color: var(--gold); font-weight: 700; }
.stats-empty {
  margin-top: 18px; text-align: center; color: var(--text-secondary); font-size: 14px;
  padding: 24px; border: 1px dashed var(--border-bright); border-radius: var(--radius-md);
  background: radial-gradient(120% 120% at 50% 0%, rgba(255,193,7,0.05), transparent 60%);
}
.stats-empty b { color: var(--text-primary); }

/* ── Clickable match cards + detail modal ── */
.match-card.clickable { cursor: pointer; }
.match-card.clickable:hover { border-color: var(--gold); }
.match-detail-hint { font-size: 10px; color: var(--text-muted); margin-top: 4px; opacity: .8; }

.match-modal {
  position: fixed; inset: 0; z-index: 1000; display: none;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(4,8,12,0.78); backdrop-filter: blur(4px);
}
.match-modal.open { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.match-modal-card {
  width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg); padding: 22px 22px 26px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}
.mm-close { float: right; font-size: 22px; line-height: 1; cursor: pointer; color: var(--text-muted); background: none; border: none; }
.mm-close:hover { color: var(--text-primary); }
.mm-head { text-align: center; margin-bottom: 18px; }
.mm-teams { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 6px; }
.mm-team { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 0; }
.mm-team .fl { font-size: 34px; }
.mm-team .nm { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.mm-score { font-family: var(--font-display); font-size: 40px; color: var(--text-primary); white-space: nowrap; }
.mm-score.tbd { font-size: 22px; color: var(--text-muted); }
.mm-sub { font-size: 12px; color: var(--text-muted); }
.mm-pens { font-size: 12px; color: var(--gold); font-weight: 700; margin-top: 2px; }
.mm-section { margin-top: 16px; }
.mm-section-t { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
.mm-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
.mm-row:last-child { border-bottom: none; }
.mm-min { min-width: 38px; font-weight: 800; color: var(--text-primary); }
.mm-card-yellow { width: 11px; height: 15px; border-radius: 2px; background: #f5c518; display: inline-block; }
.mm-card-red { width: 11px; height: 15px; border-radius: 2px; background: #e0392b; display: inline-block; }
.mm-empty { color: var(--text-muted); font-size: 13px; padding: 6px 0; }
.mm-loading { text-align: center; color: var(--text-secondary); padding: 30px; }

/* Comparison stats (possession / shots / xG) */
.mm-stat-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; padding: 5px 0; font-size: 13px; }
.mm-stat-row .v { font-weight: 800; color: var(--text-primary); min-width: 34px; }
.mm-stat-row .v.home { text-align: right; }
.mm-stat-row .v.away { text-align: left; }
.mm-stat-row .v.lead { color: var(--gold); }
.mm-stat-row .lbl { font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-muted); text-align: center; }
.mm-poss-bar { display: flex; height: 8px; border-radius: 100px; overflow: hidden; margin: 4px 0 10px; background: var(--surface-2); }
.mm-poss-bar .ph { background: var(--field-light, #21c97a); }
.mm-poss-bar .pa { background: var(--electric, #00b4ff); }

/* ── Arabic (RTL) ── */
html[lang="ar"] body,
html[lang="ar"] button,
html[lang="ar"] input { font-family: 'Tajawal', 'Sora', sans-serif; }
html[lang="ar"] .hero-title,
html[lang="ar"] .section-title,
html[lang="ar"] .mm-score,
html[lang="ar"] .stat-value,
html[lang="ar"] .scorers-empty-title { font-family: 'Tajawal', 'Anton', sans-serif; font-weight: 800; }
html[dir="rtl"] .match-team.away > div { text-align: left !important; }
html[dir="rtl"] .match-team.home > div { text-align: right; }
html[dir="rtl"] .host-chip { direction: ltr; }
html[dir="rtl"] .match-time, html[dir="rtl"] .mm-sub, html[dir="rtl"] .news-date { direction: ltr; unicode-bidi: embed; }

</style>
</head>

<!-- ═══════════════════════════════════════ HEADER ════ -->

<!-- ═══════════════════════════════════════ HERO ════ -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid-lines"></div>
  <div class="container" style="position:relative;z-index:2;width:100%;padding-top:32px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:40px;">
      <div class="hero-content">
        <div class="hero-eyebrow">
          <div class="hero-eyebrow-dot pulse"></div>
          <span data-i18n="hero_eyebrow"></span>
        </div>
        <h1 class="hero-title">
          <div class="line1" data-i18n="hero_line1"></div>
          <div class="line2" data-i18n="hero_line2"></div>
          <div class="line3" data-i18n="hero_line3"></div>

/* ────────────────────────────────────────────────────────
   LANGUAGE STATE
──────────────────────────────────────────────────────── */
let currentLang = localStorage.getItem('wc26_lang') || 'fr';

function t(key) {
  return (i18n[currentLang] && i18n[currentLang][key]) || (i18n['fr'][key]) || key;
}

function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('wc26_lang', lang); } catch(e) {}
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (key === 'footer_api_note') { el.innerHTML = val; }
    else { el.textContent = val; }
  });
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
  // Re-render dynamic content that needs full re-build for lang
  renderRoundTabs();
  renderMatches(currentFilter);
  renderGroups();
  renderScorers();
  renderNews();
  renderTeams();
  renderTournamentStats();
  renderStatLeaders();
  renderBanner();
}

/* ────────────────────────────────────────────────────────
   COUNTDOWN
──────────────────────────────────────────────────────── */
function updateCountdown() {
  const target = new Date('2026-06-11T15:00:00-04:00'); // Mexico–South Africa · 15:00 ET · 20:00 Morocco
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    // Tournament started
    document.getElementById('cd-days').textContent  = '00';
    document.getElementById('cd-hours').textContent = '00';
    document.getElementById('cd-mins').textContent  = '00';
    document.getElementById('cd-secs').textContent  = '00';
    return;
  }
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent  = String(days).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('cd-mins').textContent  = String(mins).padStart(2,'0');
  document.getElementById('cd-secs').textContent  = String(secs).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

    `${s.bestAttack.flag} ${s.bestAttack.name}`, `${s.bestAttack.value} ${tr('buts marqués', 'goals scored', 'أهداف مسجلة')}`));
  if (s.bestDefense) c.push(card('🛡️', tr('Meilleure défense', 'Best defense', 'أفضل دفاع'),
    `${s.bestDefense.flag} ${s.bestDefense.name}`, `${s.bestDefense.value} ${tr('buts encaissés', 'goals conceded', 'أهداف مستقبَلة')}`));
  if (s.mostWins) c.push(card('🏅', tr('Plus de victoires', 'Most wins', 'الأكثر انتصارات'),
    `${s.mostWins.flag} ${s.mostWins.name}`, `${s.mostWins.value} ${tr('victoires', 'wins', 'انتصارات')}`));
  if (s.biggestWin) c.push(card('💥', tr('Plus large victoire', 'Biggest win', 'أكبر فوز'), s.biggestWin, '', true));
  if (s.highestScoring && s.highestScoring !== s.biggestWin)
    c.push(card('🔥', tr('Match le plus prolifique', 'Highest-scoring match', 'المباراة الأكثر أهدافاً'), s.highestScoring, '', true));

  el.innerHTML = c.join('');

let currentFilter = 'all';
let currentRound = 'all';

/* Morocco kick-off time 🇲🇦 — prefer the feed's timeMa (exact, Africa/Casablanca);
   otherwise derive it from the ET string: ET (UTC-4) → Morocco (UTC+1) = +5 h
   for the whole tournament window (June–July 2026). */
function maTimeOf(m) {
  if (m.timeMa) return m.timeMa;
  const p = /^(\d{1,2}):(\d{2})\s*ET$/.exec(m.time || '');
  if (!p) return '';
  return String((parseInt(p[1], 10) + 5) % 24).padStart(2, '0') + ':' + p[2];
}

const ROUND_LABELS = {
  all:  { fr:'Tous',       en:'All',          ar:'الكل' },
  G1:   { fr:'Groupes J1', en:'Groups · MD1', ar:'المجموعات · ج1' },
  G2:   { fr:'Groupes J2', en:'Groups · MD2', ar:'المجموعات · ج2' },
  G3:   { fr:'Groupes J3', en:'Groups · MD3', ar:'المجموعات · ج3' },
  R32:  { fr:'1/16',       en:'R32',          ar:'دور الـ32' },
  R16:  { fr:'1/8',        en:'R16',          ar:'دور الـ16' },
  QF:   { fr:'1/4',        en:'QF',           ar:'ربع النهائي' },
  SF:   { fr:'1/2',        en:'SF',           ar:'نصف النهائي' },
  '3P': { fr:'3e place',   en:'3rd place',    ar:'المركز الثالث' },
  F:    { fr:'Finale',     en:'Final',        ar:'النهائي' },
};
const ROUND_ORDER = ['all','G1','G2','G3','R32','R16','QF','SF','3P','F'];

function renderRoundTabs() {
  const el = document.getElementById('round-tabs');
  if (!el) return;
  const sched = DATA.schedule || [];
  if (!sched.length) { el.innerHTML = ''; return; }          // no full schedule yet → hide tabs
  const present = new Set(sched.map(m => m.round));
  const tabs = ROUND_ORDER.filter(r => r === 'all' || present.has(r));
  el.innerHTML = tabs.map(r => {
    const L = ROUND_LABELS[r];
    const lbl = L ? (L[currentLang] || L.en) : r;
    const count = r === 'all' ? sched.length : sched.filter(m => m.round === r).length;
    return `<button class="round-tab ${r === currentRound ? 'active' : ''}" onclick="selectRound('${r}')">${lbl}<span class="rt-count">${count}</span></button>`;
  }).join('');
}

function selectRound(r) {
  currentRound = r;
  renderRoundTabs();
  renderMatches(currentFilter);
}

function renderMatchFilters() {
  const filters = [
    { key:'all',      labelKey:'filter_all'      },
    { key:'live',     labelKey:'filter_live'     },
    { key:'upcoming', labelKey:'filter_upcoming' },
    { key:'finished', labelKey:'filter_finished' },
  ];
  const el = document.getElementById('match-filters');
  el.innerHTML = filters.map(f => `
    <button class="match-filter ${f.key === currentFilter ? 'active' : ''}"
            onclick="filterMatches('${f.key}')">${t(f.labelKey)}</button>
  `).join('');
}

function filterMatches(filter) {
  currentFilter = filter;
  renderMatchFilters();
  renderMatches(filter);
}

function renderMatches(filter) {
  const list = document.getElementById('matches-list');
  const sched = DATA.schedule || [];
  let matches;
  if (currentRound !== 'all' && sched.length) {
    matches = sched.filter(m => m.round === currentRound);                  // a specific round → all its matches
  } else {
    matches = (DATA.matches && DATA.matches.length) ? DATA.matches : sched; // overview → curated set
  }
  if (filter !== 'all') matches = matches.filter(m => m.status === filter);

  if (!matches.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted)">${tr('Aucun match', 'No matches', 'لا مباريات')}</div>`;
    return;
  }

  const clickable = typeof dataStatus !== 'undefined' && dataStatus.state === 'live';
  list.innerHTML = matches.map(m => {
    const isLive = m.status === 'live';
    const isFinished = m.status === 'finished';
    const isUpcoming = m.status === 'upcoming';

    const badgeHtml = isLive
      ? `<span class="badge badge-live"><span class="pulse">●</span> LIVE ${m.minute}${t('match_live_min')}</span>`
      : isFinished
        ? `<span class="badge" style="background:rgba(255,255,255,0.06);color:var(--text-muted)">${t('match_finished')}</span>`
        : `<span class="badge badge-soon">${t('match_upcoming')}</span>`;

    const scoreHtml = m.score
      ? `<div class="match-score">${m.score.home} ${t('match_vs')} ${m.score.away}</div>`
      : `<div class="match-score tbd">VS</div>`;

    return `
      <div class="match-card ${isLive ? 'live' : ''}${clickable ? ' clickable' : ''}"${clickable ? ` onclick="openMatchDetail('${m.id}')"` : ''}>
        <div class="match-team home">
          <span class="match-team-flag">${m.home.flag}</span>
          <div>
            <div class="match-team-name">${m.home.name}</div>
            ${m.home.rank ? `<div class="match-team-rank">FIFA #${m.home.rank}</div>` : ''}
          </div>
        </div>
        <div class="match-center">
          ${scoreHtml}
          <div class="match-meta">
            ${m.opener ? `<div class="match-opener">${tr("★ Match d'ouverture", '★ Opening match', '★ المباراة الافتتاحية')}</div>` : ''}
            ${badgeHtml}
            <div class="match-group-label">${t('match_group')} ${m.group}</div>
            <div class="match-time">${m.time}${maTimeOf(m) ? ` · ${maTimeOf(m)} 🇲🇦` : ''} · ${m.date}</div>
            ${m.venue ? `<div class="match-venue">${m.venue}</div>` : ''}
            ${clickable ? `<div class="match-detail-hint">${tr('🔎 Détail du match', '🔎 Match details', '🔎 تفاصيل المباراة')}</div>` : ''}
          </div>
        </div>
        <div class="match-team away">
          <span class="match-team-flag">${m.away.flag}</span>
          <div style="text-align:right">
            <div class="match-team-name">${m.away.name}</div>
            ${m.away.rank ? `<div class="match-team-rank">FIFA #${m.away.rank}</div>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ────────────────────────────────────────────────────────
   MATCH DETAIL MODAL (on-demand · free football-data events)
──────────────────────────────────────────────────────── */
const MATCH_URL = (window.WC26_API_BASE || '') + '/api/match';

async function openMatchDetail(id) {
  const modal = document.getElementById('match-modal');
  const card = document.getElementById('match-modal-card');
  modal.classList.add('open');
  card.innerHTML = `<button class="mm-close" onclick="closeMatchDetail()">×</button><div class="mm-loading">${tr('Chargement du détail…', 'Loading match details…', 'جارٍ تحميل التفاصيل…')}</div>`;
  try {
    const res = await fetch(`${MATCH_URL}?id=${encodeURIComponent(id)}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    renderMatchDetail(await res.json());
  } catch (e) {
    card.innerHTML = `<button class="mm-close" onclick="closeMatchDetail()">×</button><div class="mm-loading">${tr('Détail indisponible pour ce match.', 'Match details unavailable.', 'التفاصيل غير متاحة لهذه المباراة.')}</div>`;
  }
}

function closeMatchDetail() {
  const m = document.getElementById('match-modal');
  if (m) m.classList.remove('open');
}

function renderMatchDetail(d) {
  const fr = currentLang === 'fr';
  const card = document.getElementById('match-modal-card');
  const ft = d.score?.ft || {}, ht = d.score?.ht || {}, pens = d.score?.pens;
  const hasScore = ft.home != null && ft.away != null;
  const timeStr = d.time ? `${d.time}${maTimeOf(d) ? ` · ${maTimeOf(d)} 🇲🇦` : ''}` : '';
  const sub = [d.group ? tr('Groupe ', 'Group ', 'المجموعة ') + d.group : (d.stage || ''), d.date, timeStr, d.venue].filter(Boolean).join(' · ');

  const goalRows = (d.goals || []).length
    ? d.goals.map(g => `<div class="mm-row"><span class="mm-min">${g.minute || ''}'</span>⚽ ${g.scorer || '?'}${g.assist ? ` <span style="color:var(--text-muted)">(${tr('passe', 'assist', 'تمريرة')}: ${g.assist})</span>` : ''}<span style="margin-left:auto;color:var(--text-muted)">${g.team || ''}</span></div>`).join('')
    : `<div class="mm-empty">${d.status === 'upcoming' ? tr('Match pas encore joué.', 'Match not played yet.', 'المباراة لم تُلعب بعد.') : tr('Aucun but.', 'No goals.', 'لا أهداف.')}</div>`;

  const cardRows = (d.bookings || []).length
    ? d.bookings.map(b => `<div class="mm-row"><span class="mm-min">${b.minute || ''}'</span><span class="mm-card-${b.card === 'RED' ? 'red' : 'yellow'}"></span> ${b.player || '?'}<span style="margin-left:auto;color:var(--text-muted)">${b.team || ''}</span></div>`).join('')
    : `<div class="mm-empty">${tr('Aucun carton.', 'No cards.', 'لا بطاقات.')}</div>`;

  const ref = (d.referees || [])[0] || null;

  /* Optional extras (possession / shots / xG) — present only when the
     BALLDONTLIE feed is configured server-side */
  let statsHtml = '';
  const x = d.extras;
  if (x) {
    const row = (label, p, fmt) => {
      if (!p || (p.home == null && p.away == null)) return '';
      const f = fmt || (v => v);
      const hLead = p.home != null && p.away != null && p.home > p.away;
      const aLead = p.home != null && p.away != null && p.away > p.home;
      return `<div class="mm-stat-row">
        <span class="v home${hLead ? ' lead' : ''}">${p.home != null ? f(p.home) : '—'}</span>
        <span class="lbl">${label}</span>
        <span class="v away${aLead ? ' lead' : ''}">${p.away != null ? f(p.away) : '—'}</span>
      </div>`;
    };
    const poss = x.possession;
    const possBar = (poss && poss.home != null && poss.away != null)
      ? `<div class="mm-poss-bar"><span class="ph" style="width:${poss.home}%"></span><span class="pa" style="width:${poss.away}%"></span></div>` : '';
    const rows = [
      row(tr('Possession', 'Possession', 'الاستحواذ'), poss, v => v + '%'),
      possBar,
      row('xG', x.xg, v => Number(v).toFixed(2)),
      row(tr('Tirs', 'Shots', 'تسديدات'), x.shots),
      row(tr('Tirs cadrés', 'On target', 'على المرمى'), x.shotsOnTarget),
      row(tr('Grosses occasions', 'Big chances', 'فرص محققة'), x.bigChances),
      row(tr('Corners', 'Corners', 'ركنيات'), x.corners),
      row(tr('Fautes', 'Fouls', 'أخطاء'), x.fouls),
      row(tr('Cartons jaunes', 'Yellow cards', 'بطاقات صفراء'), x.yellowCards),
      row(tr('Arrêts', 'Saves', 'تصديات'), x.saves),
      row(tr('Passes réussies', 'Accurate passes', 'تمريرات ناجحة'), x.passesAccurate),
    ].join('');
    if (rows.trim()) statsHtml = `<div class="mm-section"><div class="mm-section-t">📊 ${tr('Statistiques', 'Statistics', 'الإحصائيات')}</div>${rows}</div>`;
  }

  card.innerHTML = `
    <button class="mm-close" onclick="closeMatchDetail()">×</button>
    <div class="mm-head">
      <div class="mm-teams">
        <div class="mm-team"><span class="fl">${d.home.flag}</span><span class="nm">${d.home.name}</span></div>
        <div class="mm-score${hasScore ? '' : ' tbd'}">${hasScore ? `${ft.home} – ${ft.away}` : 'VS'}</div>
        <div class="mm-team"><span class="fl">${d.away.flag}</span><span class="nm">${d.away.name}</span></div>
      </div>
      ${hasScore && ht.home != null ? `<div class="mm-sub">${tr('Mi-temps', 'Half-time', 'الشوط الأول')} ${ht.home} – ${ht.away}</div>` : ''}
      ${pens ? `<div class="mm-pens">${tr('Tirs au but', 'Penalties', 'ركلات الترجيح')} ${pens.home} – ${pens.away}</div>` : ''}
      <div class="mm-sub">${sub}</div>
    </div>
    ${statsHtml}
    <div class="mm-section"><div class="mm-section-t">⚽ ${tr('Buts', 'Goals', 'الأهداف')}</div>${goalRows}</div>
    <div class="mm-section"><div class="mm-section-t">🟨 ${tr('Cartons', 'Cards', 'البطاقات')}</div>${cardRows}</div>
    ${ref ? `<div class="mm-section"><div class="mm-section-t">👤 ${tr('Arbitre', 'Referee', 'الحكم')}</div><div class="mm-row">${ref}</div></div>` : ''}
    ${statsHtml ? '' : `<div class="mm-sub" style="margin-top:14px;text-align:center">${tr('Possession, tirs et xG : disponibles en branchant une source premium (voir README).', 'Possession, shots and xG: available by plugging a premium source (see README).', 'الاستحواذ والتسديدات وxG: متاحة عند ربط مصدر مدفوع (انظر README).')}</div>`}
  `;
}

function renderScorers() {
  const grid = document.getElementById('scorers-grid');
  const hasScorers = DATA.scorers && DATA.scorers.length;
  const hasAssists = DATA.assisters && DATA.assisters.length;
  const fr = currentLang === 'fr';

  // Pre-tournament: no goals scored yet → elegant empty state + players to watch
  if (!hasScorers && !hasAssists) {
    const watch = (DATA.watchlist || []).map(p => `
      <div class="watch-chip">
        <span class="watch-flag">${p.flag}</span>
        <span class="watch-name">${p.name}</span>
        <span class="watch-team">${p.team}</span>
      </div>`).join('');
    grid.innerHTML = `
      <div class="scorers-empty">
        <div class="scorers-empty-emoji">👟</div>
        <div class="scorers-empty-title">${tr("La course au Soulier d'Or commence le 11 juin", 'The Golden Boot race kicks off on 11 June', 'سباق الحذاء الذهبي ينطلق في 11 يونيو')}</div>
        <div class="scorers-empty-sub">${tr(
          "Le classement des buteurs et des passeurs se remplira automatiquement dès le premier but, via le flux de données en direct.",
          'Top scorers and assist leaders fill in automatically from the very first goal, via the live data feed.',
          'سيمتلئ ترتيب الهدافين وصانعي الأهداف تلقائياً منذ أول هدف عبر البيانات المباشرة.')}</div>
        <div class="watch-label">${tr('★ Joueurs à suivre', '★ Players to watch', '★ لاعبون تحت المجهر')}</div>
        <div class="watch-grid">${watch}</div>
      </div>`;
    return;
  }

  const maxGoals = hasScorers ? DATA.scorers[0].goals : 1;
  const maxAssists = hasAssists ? DATA.assisters[0].assists : 1;

  const rankClass = i => i === 0 ? 'gold-rank' : i === 1 ? 'silver-rank' : i === 2 ? 'bronze-rank' : '';
  const rankSymbol = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1);

  const scorerRows = DATA.scorers.map((p,i) => `
    <div class="scorer-row">
      <div class="scorer-rank ${rankClass(i)}">${rankSymbol(i)}</div>
      <div class="scorer-flag">${p.flag}</div>
      <div class="scorer-info">
        <div class="scorer-name">${p.name}</div>
        <div class="scorer-team">${p.team}</div>
      </div>
      <div class="scorer-bar-wrap">
        <div class="scorer-bar-bg">
          <div class="scorer-bar-fill gold" style="width:${(p.goals/maxGoals*100)}%"></div>
        </div>
      </div>
      <div class="scorer-stat gold-text">${p.goals}</div>
    </div>
  `).join('');

  const assistRows = DATA.assisters.map((p,i) => `
    <div class="scorer-row">
      <div class="scorer-rank ${rankClass(i)}">${rankSymbol(i)}</div>
      <div class="scorer-flag">${p.flag}</div>
      <div class="scorer-info">
        <div class="scorer-name">${p.name}</div>
        <div class="scorer-team">${p.team}</div>
      </div>
      <div class="scorer-bar-wrap">
        <div class="scorer-bar-bg">
          <div class="scorer-bar-fill green" style="width:${(p.assists/maxAssists*100)}%"></div>
        </div>
      </div>
      <div class="scorer-stat">${p.assists}</div>
    </div>
  `).join('');

  document.getElementById('scorers-grid').innerHTML = `
    <div class="scorers-panel">
      <div class="scorers-panel-header">
        <span class="scorers-panel-title">${t('panel_scorers')}</span>
        <span class="scorers-panel-sub">${t('goals_unit')}</span>
      </div>
      ${scorerRows}
    </div>
    <div class="scorers-panel">
      <div class="scorers-panel-header">
        <span class="scorers-panel-title">${t('panel_assists')}</span>
        <span class="scorers-panel-sub">${t('assists_unit')}</span>
      </div>
      ${assistRows}
    </div>
  `;
}

      <a href="${article.url}" class="news-card ${article.featured ? 'featured' : ''}" target="_blank" rel="noopener">
        <div class="news-img" style="background:linear-gradient(135deg,${article.color} 0%, #0c1722 100%)">
          <div class="news-img-placeholder">${article.emoji}</div>
        </div>
        <div class="news-body">
          <div class="news-source">
            ${article.source}
            <span class="news-source-dot"></span>
            <span class="news-date">${article.date}</span>
          </div>
          <div class="news-title">${title}</div>
          <div class="news-excerpt">${excerpt}</div>
          <div class="news-read-more">${t('read_more')}</div>
        </div>
      </a>`;
  }).join('');
}

/* ────────────────────────────────────────────────────────
   SCROLL REVEAL
──────────────────────────────────────────────────────── */
function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach((el, i) => {
    observer.observe(el);
  });
}

/* ────────────────────────────────────────────────────────
   HEADER SCROLL EFFECT
──────────────────────────────────────────────────────── */
window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* ────────────────────────────────────────────────────────
   LIVE DATA — AI / API backend feed (with graceful fallback)
   GETs {SNAPSHOT_URL}. On success it merges the JSON snapshot into DATA and
   re-renders everything. On failure (e.g. opened as a local file with no
   backend running) it keeps the embedded REAL pre-tournament data. The backend
   that produces this snapshot lives in /server (see README). Override the base
   URL by setting `window.WC26_API_BASE` before this script runs.
──────────────────────────────────────────────────────── */
const SNAPSHOT_URL   = (window.WC26_API_BASE || '') + '/api/snapshot';
const LIVE_REFRESH_MS = 5 * 60 * 1000;        // re-poll every 5 minutes
let dataStatus = { state: 'fallback', ts: null };
let liveTimer = null;

function fmtTime(ts) {
  const locale = currentLang === 'ar' ? 'ar-MA' : currentLang === 'fr' ? 'fr-CA' : 'en-CA';
  try { return new Date(ts).toLocaleTimeString(locale, { hour:'2-digit', minute:'2-digit' }); }
  catch (e) { return ''; }
}

function renderBanner() {
  const el = document.getElementById('demo-banner');
  if (!el) return;
  const icon = el.querySelector('.icon');
  const msg  = el.querySelector('.msg');
  const btn  = el.querySelector('.refresh-btn');
  el.classList.remove('is-live', 'is-loading');
  btn.style.display = '';
  btn.textContent = tr('↻ Actualiser', '↻ Refresh', '↻ تحديث');

  if (dataStatus.state === 'loading') {
    el.classList.add('is-loading');
    icon.textContent = '⏳';
    msg.textContent = tr('Mise à jour des données…', 'Refreshing data…', 'جارٍ تحديث البيانات…');
    btn.style.display = 'none';
  } else if (dataStatus.state === 'live') {
    el.classList.add('is-live');
    icon.textContent = '🟢';
    msg.textContent = tr('Données en direct', 'Live data', 'بيانات مباشرة')
      + (dataStatus.ts ? ' · ' + tr('maj ', 'upd ', 'حُدِّث ') + fmtTime(dataStatus.ts) : '');
  } else {
    icon.textContent = '📡';
    msg.textContent = tr(
      "Données officielles d'avant-tournoi (tirage, calendrier, classement FIFA). Lancez le service pour le direct.",
      'Official pre-tournament data (draw, schedule, FIFA ranking). Start the data service for live updates.',
      'بيانات رسمية لما قبل البطولة (القرعة، الجدول، تصنيف الفيفا). شغّل الخدمة للبث المباشر.');
  }
}

function rerenderAll() {
  renderHostCities();
  renderTournamentStats();
  renderStatLeaders();
  renderRoundTabs();
  renderMatchFilters();
  renderMatches(currentFilter);
  renderGroups();
  renderScorers();
  renderTeams();
  renderNews();
}

async function loadLiveData(manual) {
  if (dataStatus.state === 'loading') return;
  dataStatus.state = 'loading'; renderBanner();
  try {
    const res = await fetch(SNAPSHOT_URL, { headers: { accept: 'application/json' }, cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const snap = await res.json();
    // Merge only the keys the feed provides; missing keys keep the embedded data
    ['tournament','hostCities','groups','matches','scorers','assisters','watchlist','teams','news','schedule','stats'].forEach(k => {
      if (snap[k] !== undefined && snap[k] !== null) DATA[k] = snap[k];
    });
    dataStatus = { state: 'live', ts: snap.updatedAt || Date.now() };
    rerenderAll();
    renderBanner();
  } catch (e) {
    dataStatus.state = 'fallback';
    renderBanner();
    if (manual) console.warn('[WC26] Live feed unavailable — using embedded data:', e.message);
  }
}

/* ────────────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────────────── */
function init() {
  // Set initial language from storage/default
  document.getElementById('btn-fr').classList.toggle('active', currentLang === 'fr');
  document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
  document.getElementById('btn-ar').classList.toggle('active', currentLang === 'ar');
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

  // Render static i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (key === 'footer_api_note') el.innerHTML = val;
    else el.textContent = val;
  });

  // Render dynamic sections
  renderHostCities();
  renderTournamentStats();
  renderStatLeaders();
  renderRoundTabs();
  renderMatchFilters();
  renderMatches('all');
  renderGroups();
  renderScorers();
  renderTeams();
  renderNews();
  renderBanner();

  // Scroll reveal
  initReveal();

  // Try the live AI/API feed (skipped on file:// where fetch can't reach a backend)
  if (location.protocol !== 'file:') {
    loadLiveData();
    liveTimer = setInterval(loadLiveData, LIVE_REFRESH_MS);
  }
}

document.addEventListener('DOMContentLoaded', init);

</script>
